    <!-- 扣子 Coze -->
    <g transform="translate(290, 380)">
      <rect x="-48" y="-22" width="96" height="44" rx="6" fill="#F5F5F5" stroke="#757575" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">扣子 Coze</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">字节 · 开发者</text>
    </g>

    <!-- 腾讯元器 -->
    <g transform="translate(135, 440)">
      <rect x="-48" y="-22" width="96" height="44" rx="6" fill="#F5F5F5" stroke="#757575" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">腾讯元器</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">零代码智能体</text>
    </g>

    <!-- =========================================
         Q4: 生态中立 + 个人/开源（右下）
         ========================================= -->

    <!-- OpenClaw (龙虾) - 开源基座 -->
    <g transform="translate(570, 345)">
      <rect x="-70" y="-22" width="140" height="44" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">🦞 OpenClaw</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2E7D32">开源龙虾 · 34万★</text>
    </g>

    <!-- ArkClaw -->
    <g transform="translate(705, 385)">
      <rect x="-50" y="-22" width="100" height="44" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">ArkClaw</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2E7D32">字节 · 云端SaaS</text>
    </g>

    <!-- AutoClaw (澳龙) -->
    <g transform="translate(460, 430)">
      <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">AutoClaw 澳龙</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2E7D32">智谱 · 本地一键装</text>
    </g>

    <!-- Dify -->
    <g transform="translate(615, 455)">
      <rect x="-42" y="-22" width="84" height="44" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">Dify</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2E7D32">开源开发平台</text>
    </g>

    <!-- MiniMax MaxClaw -->
    <g transform="translate(725, 460)">
      <rect x="-52" y="-22" width="104" height="44" rx="6" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#1B5E20">MaxClaw</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2E7D32">MiniMax · 智能体</text>
    </g>
  </g>

  <!-- Legend (bottom) -->
  <g transform="translate(110, 640)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#333">图例：</text>

    <rect x="50" y="-10" width="14" height="14" fill="#E6F0FD" stroke="#1976D2"/>
    <text x="70" y="1" font-size="12" fill="#333">大厂办公生态（绑定）</text>

    <rect x="225" y="-10" width="14" height="14" fill="#FFF8E1" stroke="#F57C00"/>
    <text x="245" y="1" font-size="12" fill="#333">独立企业级平台</text>

    <rect x="380" y="-10" width="14" height="14" fill="#E8F5E9" stroke="#388E3C"/>
    <text x="400" y="1" font-size="12" fill="#333">OpenClaw 生态 / 开源</text>

    <rect x="545" y="-10" width="14" height="14" fill="#FF6B35" stroke="#D84315"/>
    <text x="565" y="1" font-size="12" fill="#333">🦀 本次重点（帝王蟹）</text>
  </g>

  <!-- Key insight box -->
  <g transform="translate(110, 672)">
    <rect x="0" y="0" width="780" height="36" rx="4" fill="#FFF9E6" stroke="#F0D58E" stroke-width="1"/>
    <text x="14" y="15" font-size="11" font-weight="700" fill="#8B6914">核心洞察</text>
    <text x="14" y="29" font-size="11" fill="#5F4B1E">帝王蟹是国内唯一在「企业管理」+「生态中立」象限占位的产品 —— 既不绑IM，也不绑大模型，可成为企业现有工作流的"上层管控中枢"。</text>
  </g>
</svg>
