<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 820" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="100%" stop-color="#f7f2e8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1240" height="820" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="620" y="46" text-anchor="middle" font-size="26" font-weight="800" fill="#2b1b12">2026 企业级 AI Agent 市场定位地图</text>
  <text x="620" y="72" text-anchor="middle" font-size="14" fill="#6f6258">国内主要玩家按「生态策略」与「产品定位」二维分布 · 帝王蟹 ClawHive 占据右上角空白象限</text>

  <!-- Chart area: x 150..1140 (width 990), y 110..650 (height 540) -->
  <!-- Quadrants -->
  <rect x="150" y="110" width="495" height="270" fill="#eef2f7" opacity="0.55"/>
  <rect x="645" y="110" width="495" height="270" fill="#fff4e6" opacity="0.7"/>
  <rect x="150" y="380" width="495" height="270" fill="#f4f4f4" opacity="0.55"/>
  <rect x="645" y="380" width="495" height="270" fill="#eef7ee" opacity="0.55"/>

  <!-- Quadrant corner labels -->
  <text x="166" y="132" font-size="12" fill="#8896a6" font-weight="700">① 生态绑定 · 企业管理</text>
  <text x="1124" y="132" text-anchor="end" font-size="12" fill="#b56a00" font-weight="700">② 中立开放 · 企业管理（核心战场）</text>
  <text x="166" y="640" font-size="12" fill="#8896a6" font-weight="700">③ 生态绑定 · 个人/开发者</text>
  <text x="1124" y="640" text-anchor="end" font-size="12" fill="#3c8a3c" font-weight="700">④ 中立开放 · 个人/开源</text>

  <!-- Axes -->
  <line x1="150" y1="380" x2="1140" y2="380" stroke="#8a7456" stroke-width="1.5" opacity="0.5"/>
  <line x1="645" y1="110" x2="645" y2="650" stroke="#8a7456" stroke-width="1.5" opacity="0.5"/>

  <!-- Axis labels (outside chart area) -->
  <text x="138" y="160" text-anchor="end" font-size="13" font-weight="700" fill="#3a2c20">↑ 企业管理中枢</text>
  <text x="138" y="610" text-anchor="end" font-size="13" font-weight="700" fill="#3a2c20">↓ 个人 / 执行工具</text>
  <text x="160" y="676" font-size="13" font-weight="700" fill="#3a2c20">← 绑定自家生态</text>
  <text x="1130" y="676" text-anchor="end" font-size="13" font-weight="700" fill="#3a2c20">生态中立 · 开放 →</text>

  <!-- ============= Q1: 生态绑定 + 企业管理 (left-top) ============= -->
  <!-- 钉钉 AI 助理 -->
  <g transform="translate(245,180)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#e6f0fd" stroke="#1976d2" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#0d47a1">钉钉 AI 助理</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565c0">阿里 · 通义千问</text>
  </g>
  <!-- 飞书 aily -->
  <g transform="translate(420,235)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#e6f0fd" stroke="#1976d2" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#0d47a1">飞书 aily / 智能伙伴</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565c0">字节 · 豆包</text>
  </g>
  <!-- 企微 / WorkBuddy -->
  <g transform="translate(245,290)">
    <rect x="-78" y="-22" width="156" height="44" rx="8" fill="#e6f0fd" stroke="#1976d2" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#0d47a1">企业微信 / WorkBuddy</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565c0">腾讯 · 混元 + 多模型</text>
  </g>
  <!-- 百度千帆 AppBuilder -->
  <g transform="translate(490,335)">
    <rect x="-78" y="-22" width="156" height="44" rx="8" fill="#e6f0fd" stroke="#1976d2" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#0d47a1">百度千帆 AppBuilder</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565c0">文心 · 应用开发</text>
  </g>

