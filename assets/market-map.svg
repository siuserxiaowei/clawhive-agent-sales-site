<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif">
  <!-- Background -->
  <rect width="1000" height="720" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1A1A1A">2026 企业级 AI Agent 市场定位地图</text>
  <text x="500" y="62" text-anchor="middle" font-size="13" fill="#6B6B6B">国内主要玩家按「生态策略」与「产品定位」二维分布</text>

  <!-- Chart area -->
  <g transform="translate(110, 100)">
    <!-- Quadrant backgrounds (very subtle) -->
    <rect x="0" y="0" width="390" height="260" fill="#EEF2F7" opacity="0.5"/>
    <rect x="390" y="0" width="390" height="260" fill="#FFF4E6" opacity="0.6"/>
    <rect x="0" y="260" width="390" height="260" fill="#F5F5F5" opacity="0.5"/>
    <rect x="390" y="260" width="390" height="260" fill="#F0F7F0" opacity="0.5"/>

    <!-- Quadrant labels (corners) -->
    <text x="15" y="22" font-size="11" fill="#8896A6" font-weight="600">① 生态绑定型 · 企业管理</text>
    <text x="765" y="22" text-anchor="end" font-size="11" fill="#D48806" font-weight="600">② 中立开放型 · 企业管理</text>
    <text x="15" y="512" font-size="11" fill="#8896A6" font-weight="600">③ 生态绑定型 · 个人/开发者</text>
    <text x="765" y="512" text-anchor="end" font-size="11" fill="#52A852" font-weight="600">④ 中立开放型 · 个人/开源</text>

    <!-- Axes -->
    <line x1="0" y1="260" x2="780" y2="260" stroke="#33333322" stroke-width="1.5"/>
    <line x1="390" y1="0" x2="390" y2="520" stroke="#33333322" stroke-width="1.5"/>

    <!-- Axis arrows and labels -->
    <line x1="0" y1="260" x2="0" y2="260" stroke="#333" stroke-width="0"/>
    <text x="-8" y="12" text-anchor="end" font-size="12" fill="#444" font-weight="600">↑ 企业管理中枢</text>
    <text x="-8" y="516" text-anchor="end" font-size="12" fill="#444" font-weight="600">↓ 个人/执行工具</text>
    <text x="4" y="540" font-size="12" fill="#444" font-weight="600">← 绑定自家生态</text>
    <text x="776" y="540" text-anchor="end" font-size="12" fill="#444" font-weight="600">生态中立 →</text>

    <!-- =========================================
         Q1: 生态绑定 + 企业管理（左上）
         ========================================= -->

    <!-- 钉钉 AI 助理 -->
    <g transform="translate(95, 80)">
      <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#E6F0FD" stroke="#1976D2" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">钉钉 AI 助理</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565C0">阿里 · 通义千问</text>
    </g>

    <!-- 飞书 aily / 智能伙伴 -->
    <g transform="translate(235, 135)">
      <rect x="-58" y="-22" width="116" height="44" rx="6" fill="#E6F0FD" stroke="#1976D2" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">飞书 aily</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565C0">字节 · 豆包</text>
    </g>

    <!-- 企业微信 + WorkBuddy -->
    <g transform="translate(110, 175)">
      <rect x="-65" y="-22" width="130" height="44" rx="6" fill="#E6F0FD" stroke="#1976D2" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">企业微信 / WorkBuddy</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565C0">腾讯 · 混元 + 外部模型</text>
    </g>

    <!-- 百度千帆 AppBuilder -->
    <g transform="translate(260, 215)">
      <rect x="-65" y="-22" width="130" height="44" rx="6" fill="#E6F0FD" stroke="#1976D2" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#0D47A1">百度千帆 AppBuilder</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#1565C0">文心一言 · 开发平台</text>
    </g>

