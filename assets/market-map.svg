         Q2: 生态中立 + 企业管理（右上）【重点】
         ========================================= -->

    <!-- 帝王蟹 ClawHive - HIGHLIGHTED -->
    <g transform="translate(555, 110)">
      <!-- Glow -->
      <rect x="-80" y="-32" width="160" height="64" rx="10" fill="#FFE4C4" opacity="0.7"/>
      <rect x="-75" y="-27" width="150" height="54" rx="8" fill="#FF6B35" stroke="#D84315" stroke-width="2"/>
      <text x="0" y="-9" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">🦀 帝王蟹 ClawHive</text>
      <text x="0" y="8" text-anchor="middle" font-size="10" font-weight="600" fill="#FFF3E0">网易智企 · 管控中枢</text>
      <text x="0" y="22" text-anchor="middle" font-size="9" fill="#FFECB3">对接钉钉/飞书/企微</text>
    </g>

    <!-- 实在 Agent -->
    <g transform="translate(620, 190)">
      <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">实在 Agent</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#EF6C00">视觉+大模型 RPA</text>
    </g>

    <!-- 蚂蚁 Agentar -->
    <g transform="translate(475, 210)">
      <rect x="-50" y="-22" width="100" height="44" rx="6" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">蚂蚁 Agentar</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#EF6C00">金融行业深耕</text>
    </g>

    <!-- 明略 DeepMiner -->
    <g transform="translate(720, 150)">
      <rect x="-52" y="-22" width="104" height="44" rx="6" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">明略 DeepMiner</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#EF6C00">可信·全透明审计</text>
    </g>

    <!-- BetterYeah AI -->
    <g transform="translate(710, 235)">
      <rect x="-55" y="-22" width="110" height="44" rx="6" fill="#FFF8E1" stroke="#F57C00" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#E65100">BetterYeah AI</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#EF6C00">多Agent编排</text>
    </g>

    <!-- =========================================
         Q3: 生态绑定 + 个人工具（左下）
         ========================================= -->

    <!-- WPS 灵犀 -->
    <g transform="translate(150, 345)">
      <rect x="-52" y="-22" width="104" height="44" rx="6" fill="#F5F5F5" stroke="#757575" stroke-width="1.2"/>
      <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="700" fill="#424242">WPS 灵犀</text>
      <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">金山 · Office</text>
