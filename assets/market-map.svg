  <!-- 帝王蟹 ClawHive -->
  <g transform="translate(840,200)">
    <rect x="-100" y="-36" width="200" height="72" rx="14" fill="#ffe4c4" opacity="0.85" filter="url(#soft)"/>
    <rect x="-94" y="-30" width="188" height="60" rx="12" fill="#b74918" stroke="#7a2c0a" stroke-width="2"/>
    <text x="0" y="-9" text-anchor="middle" font-size="16" font-weight="900" fill="#fff">🦀 帝王蟹 ClawHive</text>
    <text x="0" y="9" text-anchor="middle" font-size="10.5" font-weight="700" fill="#fff3e0">网易智企 · 企业管控中枢</text>
    <text x="0" y="23" text-anchor="middle" font-size="9.5" fill="#ffd29b">对接钉钉 / 飞书 / 企微 / 自建 IM</text>
  </g>
  <!-- 实在 Agent -->
  <g transform="translate(720,300)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#e65100">实在 Agent</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#ef6c00">视觉 + 大模型 RPA</text>
  </g>
  <!-- 蚂蚁 Agentar -->
  <g transform="translate(900,300)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#e65100">蚂蚁 Agentar</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#ef6c00">金融行业深耕</text>
  </g>
  <!-- 明略 DeepMiner -->
  <g transform="translate(1060,255)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#e65100">明略 DeepMiner</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#ef6c00">可信 · 全透明审计</text>
  </g>
  <!-- BetterYeah AI -->
  <g transform="translate(1060,335)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#e65100">BetterYeah AI</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#ef6c00">多 Agent 编排 / LLMOps</text>
  </g>

  <!-- ============= Q3: 生态绑定 + 个人 (left-bottom) ============= -->
  <!-- WPS 灵犀 -->
  <g transform="translate(245,440)">
    <rect x="-66" y="-22" width="132" height="44" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#424242">WPS 灵犀</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">金山 · Office 内</text>
  </g>
  <!-- 扣子 Coze -->
  <g transform="translate(490,440)">
    <rect x="-66" y="-22" width="132" height="44" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#424242">扣子 Coze</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">字节 · 开发者智能体</text>
  </g>
  <!-- 腾讯元器 -->
  <g transform="translate(245,520)">
    <rect x="-66" y="-22" width="132" height="44" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#424242">腾讯元器</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">零代码智能体</text>
  </g>
  <!-- Kimi Claw -->
  <g transform="translate(490,520)">
    <rect x="-66" y="-22" width="132" height="44" rx="8" fill="#f5f5f5" stroke="#757575" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#424242">Kimi Claw</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#616161">月之暗面 · 专属版</text>
  </g>

  <!-- ============= Q4: 中立 + 个人/开源 (right-bottom) ============= -->
  <!-- OpenClaw -->
  <g transform="translate(770,440)">
    <rect x="-90" y="-26" width="180" height="52" rx="10" fill="#e8f5e9" stroke="#1b5e20" stroke-width="1.8"/>
    <text x="0" y="-6" text-anchor="middle" font-size="14" font-weight="900" fill="#1b5e20">🦞 OpenClaw 开源龙虾</text>
    <text x="0" y="11" text-anchor="middle" font-size="10" fill="#2e7d32">奥地利 Peter · GitHub 34 万★</text>
  </g>
  <!-- ArkClaw -->
  <g transform="translate(1020,440)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#1b5e20">ArkClaw</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2e7d32">字节 · 云端 SaaS</text>
  </g>
  <!-- AutoClaw -->
  <g transform="translate(720,520)">
    <rect x="-78" y="-22" width="156" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#1b5e20">AutoClaw 澳龙</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2e7d32">智谱 · 本地一键装</text>
  </g>
  <!-- Dify -->
  <g transform="translate(900,520)">
    <rect x="-66" y="-22" width="132" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#1b5e20">Dify</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2e7d32">开源开发平台</text>
  </g>
  <!-- MaxClaw -->
  <g transform="translate(1060,520)">
    <rect x="-66" y="-22" width="132" height="44" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.4"/>
    <text x="0" y="-4" text-anchor="middle" font-size="13" font-weight="800" fill="#1b5e20">MaxClaw</text>
    <text x="0" y="13" text-anchor="middle" font-size="10" fill="#2e7d32">MiniMax · 智能体</text>
  </g>
  <!-- "ClawHive 管所有 Claw" 箭头连线 -->
  <g opacity="0.5">
    <path d="M 840,236 C 920,300 880,400 770,425" fill="none" stroke="#b74918" stroke-width="1.5" stroke-dasharray="6 5"/>
    <path d="M 840,236 C 940,330 1010,400 1020,418" fill="none" stroke="#b74918" stroke-width="1.5" stroke-dasharray="6 5"/>
    <path d="M 840,236 C 820,360 760,460 720,498" fill="none" stroke="#b74918" stroke-width="1.5" stroke-dasharray="6 5"/>
  </g>
  <text x="950" y="395" font-size="11" fill="#b74918" font-weight="700" opacity="0.9">↳ 帝王蟹可在上层统一管这些龙虾</text>

  <!-- Legend -->
  <g transform="translate(150,712)">
    <text x="0" y="0" font-size="13" font-weight="800" fill="#2b1b12">图例</text>
    <g transform="translate(54,-12)">
      <rect width="16" height="16" fill="#e6f0fd" stroke="#1976d2"/>
      <text x="22" y="13" font-size="12" fill="#3a2c20">大厂办公生态（绑定 IM）</text>
    </g>
    <g transform="translate(248,-12)">
      <rect width="16" height="16" fill="#fff8e1" stroke="#f57c00"/>
      <text x="22" y="13" font-size="12" fill="#3a2c20">独立企业级平台</text>
    </g>
    <g transform="translate(408,-12)">
      <rect width="16" height="16" fill="#e8f5e9" stroke="#388e3c"/>
      <text x="22" y="13" font-size="12" fill="#3a2c20">OpenClaw 生态 / 开源</text>
    </g>
    <g transform="translate(594,-12)">
      <rect width="16" height="16" fill="#b74918" stroke="#7a2c0a"/>
      <text x="22" y="13" font-size="12" fill="#3a2c20">🦀 本次重点（帝王蟹）</text>
    </g>
  </g>

  <!-- Insight box -->
  <g transform="translate(150,748)">
    <rect width="990" height="52" rx="8" fill="#fff8ef" stroke="#f0d5b4"/>
    <text x="18" y="22" font-size="12" font-weight="800" fill="#8b4a14">核心洞察</text>
    <text x="18" y="40" font-size="12" fill="#3a2c20">帝王蟹是国内目前唯一在「企业管理」+「生态中立」象限占位的产品 —— 不绑 IM、不绑大模型，可作为现有钉钉 / 飞书 / 企微之上的统一管控中枢，反过来还能管所有龙虾变种。</text>
  </g>
</svg>
